<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>スマホ対応・クリック＆放置爆発サイト</title>
    <style>
        /* 画面を真っ黒にする設定 */
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            
            /* 📱 スマホ特有の画面引っ張り（スクロール）やダブルタップズームを完全に禁止 */
            touch-action: none; 
            -webkit-overflow-scrolling: none;
        }

        /* 爆発動画のスタイル */
        .explosion-video {
            position: absolute;
            pointer-events: none; /* 動画自体へのタッチを無視 */
            transform: translate(-50%, -50%); /* タッチした位置が動画の中心になるように調整 */
            
            /* 📱 スマホの画面幅に合わせてサイズを調整 */
            width: 90vw; 
            max-width: 1000px; 
            height: auto;
            
            /* 黒背景の動画を透過させ、炎だけを画面に馴染ませる設定 */
            mix-blend-mode: screen; 
        }
    </style>
</head>
<body>

    <script>
        // ======= フルスクリーン化の処理 =======
        function enterFullscreen() {
            const doc = document.documentElement;
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                if (doc.requestFullscreen) {
                    doc.requestFullscreen().catch(err => console.log(err));
                } else if (doc.webkitRequestFullscreen) {
                    doc.webkitRequestFullscreen();
                }
            }
        }

        // ======= 指定した座標（X, Y）で爆発させる関数 =======
        function createExplosion(x, y) {
            const video = document.createElement('video');
            video.src = 'fire.mp4';
            video.classList.add('explosion-video');
            
            video.setAttribute('playsinline', '');
            video.setAttribute('webkit-playsinline', '');
            video.playsInline = true;

            video.style.left = `${x}px`;
            video.style.top = `${y}px`;

            document.body.appendChild(video);

            video.play().catch(error => {
                video.muted = true;
                video.play();
            });

            video.addEventListener('ended', () => {
                video.remove();
            });

            setTimeout(() => {
                if (video.parentNode) {
                    video.remove();
                }
            }, 5000);
        }

        // ======= 放置（3秒）検知と自動生成の処理 =======
        let idleTimer = null;
        let autoSpawnTimer = null;

        // ランダムな場所で爆発を生成し続ける関数（上限無制限）
        function startAutoSpawn() {
            const randomX = Math.random() * window.innerWidth;
            const randomY = Math.random() * window.innerHeight;
            
            // 件数制限なしで常に生成
            createExplosion(randomX, randomY);

            // 0.4秒〜1.2秒のランダムな間隔で次の爆発を予約
            const nextTime = Math.random() * 800 + 400;
            autoSpawnTimer = setTimeout(startAutoSpawn, nextTime);
        }

        // 放置タイマーをリセットする関数
        function resetIdleTimer() {
            // 自動生成が動いていれば止める
            clearTimeout(autoSpawnTimer);
            
            // 既存の3秒タイマーをリセット
            clearTimeout(idleTimer);
            
            // 新しく3秒後に自動生成を開始するタイマーをセット
            idleTimer = setTimeout(() => {
                startAutoSpawn();
            }, 3000);
        }


        // ======= ユーザーの操作を検知するイベント =======
        
        // 1. タップ・クリックされた時
        window.addEventListener('pointerdown', (e) => {
            if (e.button !== 0 && e.pointerType === 'mouse') return;

            enterFullscreen(); // フルスクリーン化
            createExplosion(e.clientX, e.clientY); // 押した場所で爆発
            resetIdleTimer(); // 放置タイマーをリセット
        });

        // 2. マウスや指を動かした時（動かしている間は放置と判定しない）
        window.addEventListener('pointermove', () => {
            resetIdleTimer();
        });

        // ページ読み込み時に最初のタイマーをスタート（最初から3秒放置で発動）
        resetIdleTimer();

    </script>
</body>
</html>
